<style>
:root{--mr-yellow:#C8CF04;--bg:#000;--card:#f4f4f4;--dark:#1c1c1f;}
@font-face{font-family:"MontserratLocal";src:url("fonts/Montserrat-Regular.ttf") format("truetype");font-weight:400;font-style:normal;}
@font-face{font-family:"MontserratLocal";src:url("fonts/Montserrat-SemiBold.ttf") format("truetype");font-weight:600;font-style:normal;}
@font-face{font-family:"MontserratLocal";src:url("fonts/Montserrat-Bold.ttf") format("truetype");font-weight:700;font-style:normal;}
*{box-sizing:border-box}
html,body{width:100%;max-width:100%;overflow-x:hidden;}
body{margin:0;background:#000;color:#fff;font-family:"MontserratLocal",Arial,sans-serif;min-height:100dvh;overflow:hidden;overscroll-behavior-x:none;}
button,input,select{accent-color:#C8CF04;font-family:"MontserratLocal",Arial,sans-serif;}

/* iOS/Safari graue Fokus-Balken im Login entfernen */
*{
  -webkit-tap-highlight-color: transparent !important;
}
.loginLock,
.loginBox,
.loginCard,
.loginTitle,
.loginLabel,
.loginFieldWrap,
.loginEye,
.forgotBtn,
.rememberBox,
.loginBtn,
.loginHint{
  -webkit-tap-highlight-color: transparent !important;
  -webkit-touch-callout: none !important;
  -webkit-user-select: none !important;
  user-select: none !important;
}
.loginInput{
  -webkit-tap-highlight-color: transparent !important;
  -webkit-appearance: none !important;
  appearance: none !important;
  outline: none !important;
  box-shadow: none !important;
  background-color: transparent !important;
  -webkit-user-select: text !important;
  user-select: text !important;
}
.loginInput:focus,
.loginInput:active,
.loginEye:focus,
.loginEye:active,
.loginFieldWrap:focus,
.loginFieldWrap:active,
.loginFieldWrap:focus-within{
  outline: none !important;
  box-shadow: none !important;
  -webkit-tap-highlight-color: transparent !important;
}
.loginFieldWrap:focus-within{
  border-color:#C8CF04 !important;
}
.loginEye::-moz-focus-inner,
.loginBtn::-moz-focus-inner,
.forgotBtn::-moz-focus-inner,

}


/* LOGIN – gleiche Optik wie Kassen-App */
body.auth-loading .appShell,body.logged-out .appShell{display:none!important;}
body.logged-out .loginLock{display:flex;}

.loginLock{display:none;position:fixed;inset:0;width:100%;min-height:100dvh;background:#000;z-index:20000;overflow:hidden;color:#000;align-items:flex-start;justify-content:center;padding:calc(env(safe-area-inset-top) + 58px) 0 0;}
.loginBox{width:100%;max-width:430px;display:flex;flex-direction:column;align-items:center;}

.loginCard{width:calc(100% - 48px);max-width:370px;background:#f4f4f4;border-radius:24px;box-shadow:0 0 28px rgba(255,255,255,.12);padding:68px 24px 21px;transform:translateY(-20px);}
.loginTitle{text-align:center;color:#000;font-size:34px;font-weight:700;line-height:1;margin:0 0 38px 0;letter-spacing:-.8px;transform:translateY(-40px);}
.loginLabel{display:block;color:#000;font-size:12px;font-weight:400;line-height:1;margin:0 0 9px 0;transform:translateY(-35px);}
.loginFieldWrap{width:100%;height:50px;border:1px solid #999;border-radius:7px;background:transparent;display:flex;align-items:center;padding:0 15px;margin:0 0 22px 0;transform:translateY(-40px);}
.loginFieldWrap:focus-within{border-color:#C8CF04;}

.loginInput{width:100%;border:0;outline:0;background:transparent;color:#000;font-size:14px!important;font-weight:400!important;line-height:1!important;padding:0;min-width:0;caret-color:#000;-webkit-appearance:none;appearance:none;}

.forgotMsg{position:absolute;left:0;top:20px;color:#ff4f4f;font-size:11px;font-weight:400;line-height:1.2;opacity:0;pointer-events:none;white-space:nowrap;transition:opacity .16s ease;}

.rememberBox{justify-self:start;width:auto;height:auto;border:0;background:transparent;padding:0;border-radius:0;display:flex;align-items:center;gap:7px;color:#000;font-size:14px;font-weight:400;line-height:1;white-space:nowrap;transform:translateY(29px);}
.rememberCheck{order:2;width:21px;height:21px;border:1.5px solid #C8CF04!important;border-radius:4px;display:flex;align-items:center;justify-content:center;color:#C8CF04!important;font-size:18px;font-weight:700;line-height:1;}

.loginHint{display:flex;align-items:center;justify-content:center;gap:12px;color:#fff;font-size:15px;font-weight:400;line-height:1.3;margin-top:31px;text-align:center;width:100%;padding:0 18px;}

<script>
window.mrBeautyLogoBase64 = null;

(function preloadMrBeautyExcelLogo(){
  async function tryAddExcelLogo(wb,ws){
  // Logo wird beim Start vorgeladen und hier nur noch als Base64 eingebettet.
  // Kein fetch() während dem Excel-Export.
  if(window.mrBeautyLogoBase64){
    try{
      const imageId = wb.addImage({
        base64: window.mrBeautyLogoBase64,
        extension: "png"
      });

      ws.addImage(imageId,{
        tl:{col:0,row:0},
        ext:{width:155,height:58},
        editAs:"oneCell"
      });

      return true;
    }catch(e){
      console.warn("Base64-Logo konnte nicht eingebettet werden:", e);
    }
  }

  // Fallback ohne Bild: sauberer Firmenname.
  ws.getCell("A1").value = "MR Beauty Vlora Iseni";
  ws.getCell("A1").font = {bold:true, size:18};
  ws.getCell("A1").alignment = {vertical:"middle", horizontal:"left"};
  return false;
}


async function exportReceiptsExcel(){
  const excelBtn=document.querySelector('button[onclick="exportReceiptsExcel()"]');
  const oldText=excelBtn?excelBtn.textContent:"";
  if(excelBtn){
    excelBtn.disabled=true;
    excelBtn.textContent="Excel wird erstellt...";
    excelBtn.style.opacity=".72";
    excelBtn.style.pointerEvents="none";
  }

  try{
    await new Promise(r=>setTimeout(r,150));

    const ok=await ensureReceiptsForPdfDownload();
    if(!ok)return;

    const list=getPdfDownloadReceiptList();
    if(!list.length){
      alert("Keine passenden Quittungen für den Excel-Download gefunden.");
      return;
    }

    if(typeof ExcelJS==="undefined"){
      alert("Excel-Funktion konnte nicht geladen werden. Bitte Internet prüfen.");
      return;
    }

    const wb=new ExcelJS.Workbook();
    wb.creator="MR Beauty";
    wb.created=new Date();
    const ws=wb.addWorksheet("Barzahlungen");

    ws.views=[{showGridLines:false,state:"frozen",ySplit:7}];

    ws.columns=[
      {width:15},{width:12},{width:9},{width:48},{width:62},
      {width:18},{width:15},{width:24},{width:13},{width:14}
    ];

    // Logo links oben; falls Vorschau Bilder nicht zeigt, bleibt der Kopf trotzdem sauber.
    await tryAddExcelLogo(wb,ws);

    const now=new Date();
    const dd=String(now.getDate()).padStart(2,"0");
    const mm=String(now.getMonth()+1).padStart(2,"0");
    const yyyy=now.getFullYear();
    const createdDate=dd+"."+mm+"."+yyyy;

    ws.getRow(1).height=22;
    ws.getRow(2).height=22;
    ws.getRow(3).height=22;

    ws.getCell("A5").value="Barzahlungen";
    ws.getCell("A5").font={bold:true,size:16};

    ws.getCell("A6").value="Erstelldatum:";
    ws.getCell("A6").font={bold:true};
    ws.getCell("B6").value=createdDate;

    const headerRow=7;
    const headers=["Quittung Nr.","Datum","Zeit","Ihre Referenz","Leistungen","Anzahl Leistungen","Bruttobetrag","Eingelieferte Währung","Status","Brand"];
    ws.getRow(headerRow).values=headers;
    ws.getRow(headerRow).height=24;
    ws.getRow(headerRow).eachCell(cell=>{
      cell.font={bold:true};
      cell.fill={type:"pattern",pattern:"solid",fgColor:{argb:"FFEDEDED"}};
      cell.border={
        top:{style:"thin",color:{argb:"FFBFBFBF"}},
        bottom:{style:"thin",color:{argb:"FFBFBFBF"}},
        left:{style:"thin",color:{argb:"FFD9D9D9"}},
        right:{style:"thin",color:{argb:"FFD9D9D9"}}
      };
      cell.alignment={vertical:"middle",wrapText:true};
    });
    ws.getRow(headerRow).getCell(6).alignment={vertical:"middle",horizontal:"left",wrapText:true};
    ws.getRow(headerRow).getCell(7).alignment={vertical:"middle",horizontal:"right",wrapText:true};
    ws.getRow(headerRow).getCell(8).alignment={vertical:"middle",horizontal:"left",wrapText:true};

    let rowIndex=headerRow+1;
    let total=0;

    list.forEach(r=>{
      const items=Array.isArray(r.items)?r.items:[];
      const serviceNumbers=items.map(i=>(i&& (i.serviceNumber!==undefined?i.serviceNumber:i.number))).filter(v=>v!==undefined&&v!==null&&v!=="").join("+") || serviceCodeText(r);
      const serviceNames=items.map(i=>i&&i.name).filter(Boolean).join(", ");
      const status=(r.status||"paid")==="cancelled"?"Storno":"Ausbezahlt";
      const amount=Number(r.total||0);
      total+=amount;

      const tariff=r.tariff||"Standard";
      const tariffShort=tariff==="Lehrling"?"L":"S";
      const referenz=[r.customerName||"",tariffShort,serviceNumbers||""].filter(Boolean).join(", ");

      const row=ws.getRow(rowIndex);
      row.values=[
        r.receiptNumber||r.id||"",
        r.date||"",
        r.time||"",
        referenz,
        serviceNames||"",
        r.serviceCount!==undefined?r.serviceCount:items.length,
        amount,
        "CHF",
        status,
        r.payment||"Barzahlung"
      ];

      row.getCell(7).numFmt='#,##0.00';

      const refLines=Math.ceil((referenz||"").length/46);
      const serviceLines=Math.ceil((serviceNames||"").length/62);
      row.height=Math.max(20,Math.min(100,Math.max(refLines,serviceLines)*18));

      row.eachCell(cell=>{
        cell.alignment={vertical:"top",wrapText:true};
        cell.border={bottom:{style:"thin",color:{argb:"FFE5E5E5"}}};
      });
      row.getCell(6).alignment={vertical:"top",horizontal:"left"};
      row.getCell(7).alignment={vertical:"top",horizontal:"right"};
      row.getCell(8).alignment={vertical:"top",horizontal:"left"};

      rowIndex++;
    });

    rowIndex++;
    const totalRow=ws.getRow(rowIndex);
    totalRow.getCell(6).value="Total Ausbezahlt";
    totalRow.getCell(7).value=total;
    totalRow.getCell(7).numFmt='#,##0.00';
    totalRow.getCell(8).value="CHF";
    for(let c=1;c<=10;c++){
      const cell=totalRow.getCell(c);
      cell.font={bold:true};
      cell.border={top:{style:"medium",color:{argb:"FF000000"}}};
      cell.alignment={vertical:"middle"};
    }
    totalRow.getCell(6).alignment={vertical:"middle",horizontal:"right"};
    totalRow.getCell(7).alignment={vertical:"middle",horizontal:"right"};
    totalRow.getCell(8).alignment={vertical:"middle",horizontal:"left"};

    ws.autoFilter={
      from:{row:headerRow,column:1},
      to:{row:Math.max(headerRow,rowIndex-2),column:10}
    };

    const buffer=await wb.xlsx.writeBuffer();
    const blob=new Blob([buffer],{type:"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url;
    a.download="MR_Beauty_Barzahlungen_"+yyyy+"-"+mm+"-"+dd+".xlsx";
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(()=>URL.revokeObjectURL(url),3000);

  }catch(e){
    console.error(e);
    alert("Excel konnte nicht erstellt werden.");
  }finally{
    if(excelBtn){
      excelBtn.disabled=false;
      excelBtn.textContent=oldText||"Excel download";
      excelBtn.style.opacity="";
      excelBtn.style.pointerEvents="";
    }
  }
}

async function ensureReceiptsForPdfDownload(){
  if(receipts && receipts.length) return true;
  try{
    const snap=await db.collection("test_kasse_receipts").orderBy("createdAt","desc").limit(500).get();
    receipts=snap.docs.map(doc=>({id:doc.id,...doc.data()}));
    return true;
  }catch(e){
    console.error(e);
    alert("Quittungen konnten nicht geladen werden. Bitte Internet/Firebase prüfen.");
    return false;
  }
}

function getPdfDownloadReceiptList(){
  const q=(document.getElementById("searchInput")?.value||"").toLowerCase().trim();
  let status=document.getElementById("statusFilter")?.value||"all";
  if(status==="status")status="all";

  let list=(receipts||[]).slice().sort((a,b)=>tsSortValue(b)-tsSortValue(a));
  if(status!=="all") list=list.filter(r=>(r.status||"paid")===status);
  list=list.filter(dateMatches);
  if(q) list=list.filter(r=>[r.id,r.receiptNumber,r.customerName,serviceCodeText(r),r.payment].join(" ").toLowerCase().includes(q));
  return list;
}

async function getOriginalPdfBytesByReceiptNumber(nr){
  const path="receipts/"+nr+"/Quittung_"+nr+".pdf";

  // WICHTIG: gleicher Firebase-Storage-Weg wie Quittung öffnen, aber mit festem Original-Pfad.
  const url=await storage.ref().child(path).getDownloadURL();

  const res=await fetch(url,{mode:"cors"});
  if(!res.ok) throw new Error("HTTP "+res.status);
  return await res.arrayBuffer();
}

function saveMergedOriginalPdf(bytes,fileName){
  const blob=new Blob([bytes],{type:"application/pdf"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;
  a.download=fileName;
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),3000);
}

async function exportReceiptsPdf(){
  const pdfBtn = document.querySelector('button[onclick="exportReceiptsPdf()"]');
  const oldText = pdfBtn ? pdfBtn.textContent : "";

  if(pdfBtn){
    pdfBtn.disabled = true;
    pdfBtn.textContent = "PDF wird erstellt...";
    pdfBtn.style.opacity = ".72";
    pdfBtn.style.pointerEvents = "none";
  }

  try{
    await new Promise(resolve=>setTimeout(resolve,120));

    const ok=await ensureReceiptsForPdfDownload();
    if(!ok)return;

    const list=getPdfDownloadReceiptList();
    if(!list.length){
      alert("Keine passenden Quittungen gefunden.");
      return;
    }

    if(typeof PDFLib==="undefined"){
      alert("PDF-Zusammenführen konnte nicht geladen werden. Bitte Internet prüfen.");
      return;
    }

    const pdfResults = await Promise.all(list.map(async r=>{
      const nr=(r.receiptNumber||r.id||"").trim();
      if(!nr) return {nr:"", ok:false};

      try{
        const bytes=await getOriginalPdfBytesByReceiptNumber(nr);
        return {nr, ok:true, bytes};
      }catch(e){
        console.error("Original-PDF nicht ladbar:",nr,e);
        return {nr, ok:false};
      }
    }));

    const merged=await PDFLib.PDFDocument.create();
    const failed=[];
    let added=0;

    for(const item of pdfResults){
      if(!item.nr) continue;

      if(!item.ok || !item.bytes){
        failed.push(item.nr);
        continue;
      }

      try{
        const pdf=await PDFLib.PDFDocument.load(item.bytes);
        const pages=await merged.copyPages(pdf,pdf.getPageIndices());
        pages.forEach(p=>merged.addPage(p));
        added++;
      }catch(e){
        console.error("Original-PDF konnte nicht eingefügt werden:",item.nr,e);
        failed.push(item.nr);
      }
    }

    if(!added){
      alert("Es wurde kein Original-PDF gefunden oder gelesen.\nBeispiel-Pfad: receipts/BAR-00003/Quittung_BAR-00003.pdf");
      return;
    }

    const out=await merged.save();
    saveMergedOriginalPdf(out,"Original_Quittungen_"+new Date().toISOString().slice(0,10)+".pdf");

    if(failed.length){
      alert("PDF erstellt. Nicht eingefügt: "+failed.join(", "));
    }
  }catch(e){
    console.error(e);
    alert("Original-PDFs konnten nicht zusammengeführt werden.");
  }finally{
    if(pdfBtn){
      pdfBtn.disabled = false;
      pdfBtn.textContent = oldText || "PDF download";
      pdfBtn.style.opacity = "";
      pdfBtn.style.pointerEvents = "";
    }
  }
}


function toggleStatusDropdown(){
  const m=document.getElementById("statusDropdownMenu");
  if(m)m.classList.toggle("show");
}
function selectStatusFilter(value,label,color){
  const input=document.getElementById("statusFilter");
  const btn=document.getElementById("statusDropdownBtn");
  const menu=document.getElementById("statusDropdownMenu");
  if(input)input.value=value;
  if(btn){
    const txt=(value==="all")?"Alle Status":label;
    const c=(value==="paid")?"#2FAF54":(value==="cancelled")?"#ff4f4f":"#fff";
    btn.innerHTML='<span style="color:'+c+'">'+txt+'</span><span class="statusArrow"></span>';
  }
  if(menu)menu.classList.remove("show");
  renderReceipts();
}
document.addEventListener("click",function(e){
  const wrap=e.target.closest(".statusDropdownWrap");
  if(!wrap){
    const menu=document.getElementById("statusDropdownMenu");
    if(menu)menu.classList.remove("show");
  }
});


/* Einheitlicher Button-Blink wie Kassen-App */
(function(){
  function mrButtonBlink(btn){
    if(!btn)return;
    btn.classList.remove("mrBtnBlink");
    void btn.offsetWidth;
    btn.classList.add("mrBtnBlink");
    setTimeout(function(){btn.classList.remove("mrBtnBlink");},200);
  }

  document.addEventListener("touchstart",function(e){
    var btn=e.target.closest(".actionBtn,.downloadBtn,.infoBtn,.infoClose,.logoutBtn");
    if(btn)mrButtonBlink(btn);
  },{passive:true});

  document.addEventListener("mousedown",function(e){
    var btn=e.target.closest(".actionBtn,.downloadBtn,.infoBtn,.infoClose,.logoutBtn");
    if(btn)mrButtonBlink(btn);
  },true);
})();
